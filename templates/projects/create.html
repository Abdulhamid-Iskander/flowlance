{% extends 'base.html' %}

{% block content %}
<div class="dashboard-header">
    <h1>Post a New Project 🚀</h1>
    <p style="color: var(--text-muted);">Fill in the details to find the best freelancers.</p>
</div>

<div class="project-card" style="margin-top: 20px;">
    <form method="POST" action="{% url 'projects:create_project' %}">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Project Title</label>
            <input type="text" name="title" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Description</label>
            <textarea name="description" rows="5" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Budget ($)</label>
                <input type="number" name="budget" step="0.01" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Deadline</label>
                <input type="date" name="deadline" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Required Skills (comma separated)</label>
            <input type="text" name="skills" placeholder="e.g. Django, HTML, CSS" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; font-size: 16px; padding: 12px;">Publish Project</button>
    </form>
</div>
{% endblock %}
