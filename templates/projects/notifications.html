{% extends 'base.html' %}

{% block content %}
<div class="dashboard-header">
    <h1>Notifications 🔔</h1>
</div>

<div class="project-card" style="margin-top: 20px;">
    {% for notification in notifications %}
    <div class="notification-item {% if not notification.is_read %}unread{% endif %}">
        <div>
            <p style="font-size: 16px; color: var(--text-dark);">{{ notification.message }}</p>
            <span style="font-size: 12px; color: var(--text-muted); margin-top: 5px; display: block;">{{ notification.created_at|timesince }} ago</span>
        </div>
        {% if not notification.is_read %}
        <span class="unread-dot"></span>
        {% endif %}
    </div>
    {% empty %}
    <p style="padding: 20px; color: var(--text-muted); text-align: center;">You have no notifications yet.</p>
    {% endfor %}
</div>
{% endblock %}
